name: Automate GitHub Copilot User Budget (UBB)

on:
  workflow_dispatch:
    inputs:
      budgets_file:
        description: 'Path to the CSV budgets file'
        required: true
        default: 'budgets.csv'
      enterprise_slug:
        description: 'GitHub Enterprise Slug'
        required: true
      api_version:
        description: 'GitHub API Version'
        required: true
        default: '2026-03-10'
  push:
    paths:
      - 'budgets.csv'

permissions:
  contents: write # Required to commit the report file back to the repository

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm ci || npm install

      - name: Run Budget Sync
        env:
          GITHUB_TOKEN: ${{ secrets.ENTERPRISE_BILLING_TOKEN }}
          ENTERPRISE_SLUG: ${{ github.event.inputs.enterprise_slug || secrets.ENTERPRISE_SLUG }}
          BUDGETS_FILE_PATH: ${{ github.event.inputs.budgets_file || 'budgets.csv' }}
          API_VERSION: ${{ github.event.inputs.api_version || '2026-03-10' }}
        run: node manage-budgets.js

      - name: Upload Allocation Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-allocation
          path: |
            allocation.csv
            budget-run-report.md
