name: Automate GitHub Copilot User Budget (UBB)

on:
  workflow_dispatch:
    inputs:
      budgets_file:
        description: 'Path to the CSV budgets file'
        required: true
        default: 'budgets.csv'
      enterprise_slug:
        description: 'GitHub Enterprise Slug'
        required: true
      api_version:
        description: 'GitHub API Version'
        required: true
        default: '2026-03-10'
  push:
    paths:
      - 'budgets.csv'

permissions:
  contents: write # Required to commit the report file back to the repository

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm ci || npm install

      - name: Run Budget Sync
        env:
          GITHUB_TOKEN: ${{ secrets.ENTERPRISE_BILLING_TOKEN }}
          ENTERPRISE_SLUG: ${{ github.event.inputs.enterprise_slug || secrets.ENTERPRISE_SLUG }}
          BUDGETS_FILE_PATH: ${{ github.event.inputs.budgets_file || 'budgets.csv' }}
          API_VERSION: ${{ github.event.inputs.api_version || '2026-03-10' }}
        run: node manage-budgets.js

      - name: Commit Sync Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f budget-run-report.md ]; then
            git add budget-run-report.md
            git commit -m "docs: Update budget sync execution report [skip ci]" || echo "No changes to commit"
            git push || echo "Push failed (e.g. permission error or branch protection). Proceeding."
          fi

      - name: Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-run-report
          path: budget-run-report.md
